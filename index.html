<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עילאי ושיראל - הזמנה</title>
    <style>
        :root {
            --gold: #b5952f;
            --light-gold: #f4eee0;
            --bg-creme: #fdfaf5; /* צבע שמנת בסיסי */
            --text: #333;
        }

        body { 
            margin: 0; 
            padding: 0; 
            /* רקע עדין מאוד של ענפי זית מוזהבים */
            background-color: var(--bg-creme);
            background-image: url('https://i.ibb.co/L5r2p5h/olive-branches.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            
            text-align: center; 
            font-family: system-ui, -apple-system, sans-serif; 
            color: var(--text);
        }
        
        /* תמונת ההזמנה - נשארת נקייה למעלה */
        .invitation-header { 
            width: 100%; 
            background-color: #fff;
            line-height: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            position: relative;
            z-index: 10;
        }
        
        .invitation-header img { 
            width: 100%; 
            max-width: 600px; 
            height: auto; 
            display: block; 
            margin: 0 auto; 
        }

        /* חלק אישור ההגעה (הסקר) */
        .rsvp-section { 
            padding: 50px 20px 100px 20px; 
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }

        /* כרטיס ה-RSVP */
        .rsvp-card {
            background: rgba(255, 255, 255, 0.96); /* לבן כמעט אטום כדי שהטקסט יהיה קריא */
            padding: 35px 25px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border: 1px solid rgba(181, 149, 47, 0.15); /* גבול זהב עדין מאוד */
        }

        h2 { 
            font-size: 2em; 
            color: var(--gold); 
            margin: 0 0 8px 0;
            font-weight: 300;
        }

        #guest-greeting { 
            font-size: 1.1em; 
            margin-bottom: 35px; 
            line-height: 1.5;
        }

            margin-bottom: 25px;
            text-align: right;
        }
