<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עילאי ושיראל - הזמנה</title>
    <style>
        :root {
            --gold: #b5952f;
            --light-gold: #f4eee0;
            --pink: #ff7a8a;
            --bg: #fcfaf7;
        }

        body { 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg); 
            text-align: center; 
            font-family: system-ui, -apple-system, sans-serif; 
            color: #333;
        }
        
        /* תמונת ההזמנה */
        .invitation-header { 
            width: 100%; 
            background-color: #fff;
            line-height: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        .invitation-header img { 
            width: 100%; 
            max-width: 600px; 
            height: auto; 
            display: block; 
            margin: 0 auto; 
        }

        /* עיצוב הסקר */
        .rsvp-section { 
            padding: 80px 20px; 
            max-width: 500px;
            margin: 0 auto;
        }

        .rsvp-card {
            background: white;
            padding: 40px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid var(--light-gold);
        }

        h2 { 
            font-size: 2.2em; 
            color: var(--gold); 
            margin: 0 0 10px 0;
            font-weight: 300;
        }

        .divider {
            width: 50px;
            height: 2px;
            background: var(--gold);
            margin: 20px auto;
            opacity: 0.3;
        }

        #guest-greeting { 
            font-size: 1.1em; 
            margin-bottom: 40px; 
            line-height: 1.6;
        }

        .rsvp-buttons { 
            display: flex; 
            flex-direction: column;
            gap: 15px; 
        }

        .rsvp-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 18px;
            border-radius: 50px; 
            border: 1px solid #ddd; 
            background-color: white; 
            color: #444; 
            font-size: 1.1em; 
            font-weight: 500; 
            cursor: pointer; 
            transition: all 0.3s ease;
            text-decoration: none;
        }

        /* עיצוב ספציפי לכל כפתור */
        .btn-yes:active, .btn-yes.selected { background-color: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
        .btn-maybe:active, .btn-maybe.selected { background-color: #fff3e0; border-color: #ff9800; color: #ef6c00; }
        .btn-no:active, .btn-no.selected { background-color: #ffebee; border-color: #f44336; color: #c62828; }

        .btn-icon { margin-left: 10px; font-size: 1.3em; }

        #music-note {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 24px;
            opacity: 0.5;
        }
    </style>
</head>
<body onclick="playMusic()">

    <div id="music-note">🎵</div>
    <audio id="zushaMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="invitation-header">
        <img src="IMG_20260323_092539.jpg" alt="הזמנה לחתונה">
    </div>

    <div class="rsvp-section">
        <div class="rsvp-card">
            <h2>אישור הגעה</h2>
            <div class="divider"></div>
            <p id="guest-greeting">נשמח מאוד לראותכם בין אורחינו!</p>
            
            <div class="rsvp-buttons">
                <button class="rsvp-btn btn-yes" onclick="selectRSVP('מגיע/ה בשמחה')">
                    <span class="btn-icon">✅</span> אגיע בשמחה
                </button>
                <button class="rsvp-btn btn-maybe" onclick="selectRSVP('אולי')">
                    <span class="btn-icon">❓</span> אולי (אעדכן בהמשך)
                </button>
                <button class="rsvp-btn btn-no" onclick="selectRSVP('לא אגיע')">
                    <span class="btn-icon">❌</span> לצערי לא אוכל להגיע
                </button>
            </div>
        </div>
    </div>

    <script>
        function playMusic() {
            document.getElementById('zushaMusic').play().catch(() => {});
        }

        const urlParams = new URLSearchParams(window.location.search);
        const guestName = urlParams.get('name');
        if (guestName) {
            document.getElementById('guest-greeting').innerHTML = `היי <strong>${guestName}</strong>,<br>נשמח מאוד לראותכם בחתונה שלנו!`;
        }

        function selectRSVP(status) {
            alert("תודה! התשובה נשלחה: " + status);
            // כאן תוכל להוסיף את הקישור ל-Formspree בעתיד
        }
    </script>
</body>
</html>
