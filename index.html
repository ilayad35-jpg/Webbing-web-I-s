<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עילאי ושיראל - הזמנה</title>

        :root {
            --gold: #b5952f;

            --bg: #ffffff; /* רקע לבן נקי חזר */

            --waze-blue: #33ccff;
        }

        body { 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg); 
            text-align: center; 
            font-family: system-ui, -apple-system, sans-serif; 
            color: var(--text);
            overflow-x: hidden;
        }
        
        /* תמונת ההזמנה */
        .invitation-header { 
            width: 100%; 
            background-color: #fff;
            line-height: 0;
        }
        
        .invitation-header img { 
            width: 100%; 
            max-width: 600px; 
            height: auto; 
            display: block; 
            margin: 0 auto; 
        }

        /* חלק אישור ההגעה (הסקר) */
        .rsvp-section {

            max-width: 450px;
            margin: 0 auto;
        }

            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--light-gold);
